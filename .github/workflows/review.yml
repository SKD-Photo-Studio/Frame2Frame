name: AI Code Reviewer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Need full history for diffs

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Get PR Diff
      id: pr_diff
      run: |
        git fetch origin main
        git diff origin/main...HEAD > pr_diff.patch
        
    - name: Run Gemini Review
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO_OWNER: ${{ github.repository_owner }}
        REPO_NAME: ${{ github.event.repository.name }}
      run: |
        # In the future, this calls the actual Gemini CLI or a custom script
        # For now, it will fail if the API key is not set, preventing merging.
        if [ -z "$GEMINI_API_KEY" ]; then
          echo "❌ GEMINI_API_KEY is not set in GitHub Secrets. Failing review."
          exit 1
        fi
        
        echo "✅ Gemini CLI Review placeholder. Running analysis on pr_diff.patch..."
        # node scripts/reviewer.js --diff pr_diff.patch
