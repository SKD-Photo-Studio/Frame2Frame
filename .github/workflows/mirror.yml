name: Mirror to Production (Manual)

on:
  workflow_dispatch: # Mandatory Manual Gate

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          
      - name: Push to SKD Photo Studio
        env:
          SKD_TOKEN: ${{ secrets.SKD_PHOTO_STUDIO_REPO_TOKEN }}
        run: |
          if [ -z "$SKD_TOKEN" ]; then
            echo "❌ SKD_PHOTO_STUDIO_REPO_TOKEN is not set in GitHub Secrets."
            exit 1
          fi
          
          # Add the production repository as a remote with the access token
          git remote add production "https://x-access-token:${SKD_TOKEN}@github.com/SKD-Photo-Studio/Frame2Frame.git"
          
          # Force push the main branch to the production repository
          git push production main --force
          
          echo "✅ Successfully mirrored to production repository."
