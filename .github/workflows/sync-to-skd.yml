name: Sync to SKD Organization

on:
  push:
    branches:
      - main

jobs:
  repo-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to SKD
        run: |
          git remote add skd https://x-access-token:${{ secrets.SKD_GITHUB_TOKEN }}@github.com/SKD-Photo-Studio/Frame2Frame.git
          git push skd main --force
