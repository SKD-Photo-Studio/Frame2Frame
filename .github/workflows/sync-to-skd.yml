name: Sync to SKD Photo Studio's Frame2Frame

on:
  push:
    branches:
      - main

jobs:
  repo-sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to SKD
        env:
          SKD_TOKEN: ${{ secrets.SKD_PHOTO_STUDIO_REPO_TOKEN }}
        run: |
          # 1. Remove the old remote if it exists (prevents "remote already exists" errors)
          git remote remove skd || true

          # 2. Add the remote with the token embedded in the URL
          # Format: https://x-access-token:TOKEN@github.com/ORG/REPO.git
          git remote add skd "https://x-access-token:${SKD_TOKEN}@github.com/SKD-Photo-Studio/Frame2Frame.git"

          # 3. Explicitly push the main branch
          git push skd main --force
